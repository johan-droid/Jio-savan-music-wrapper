name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # Run every 10 minutes
  workflow_dispatch:  # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping JioSaavn Wrapper
        run: |
          echo "Pinging JioSaavn wrapper to keep it alive..."
          curl -s -o /dev/null -w "%{http_code}" https://jiosaavn-music-wrapper.onrender.com/ || echo "Ping failed"
