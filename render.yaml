# 📄 render.yaml
services:
  - type: web
    name: jiosaavn-music-wrapper
    env: docker
    plan: free
    region: frankfurt
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      # Optional: Uncomment if using Redis for L2 caching
      # - key: REDIS_URL
      #   fromDatabase:
      #     name: my-redis
      #     property: connectionString
